<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเยี่ยมหลังคลอด - รพ.สต.เกาะแต้ว</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับการจัดเลย์เอาท์ -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM แบบ Browser-friendly -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- นำเข้า html2pdf.js สำหรับปริ้น PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f3f4f6; 
        }

        @media print {
            .no-print { display: none !important; }
        }

        /* ตั้งค่าหน้า A4 แบบ Fix Pixel เพื่อป้องกันปัญหาขอบแหว่งและสเกลเพี้ยนบนจอต่างๆ */
        .a4-page {
            width: 794px; /* กว้างมาตรฐาน A4 (96 DPI) */
            padding: 75px 56px 56px 56px; /* ขอบบน ~2cm (75px) ด้านอื่น ~1.5cm (56px) */
            box-sizing: border-box;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .animate-fade-in { 
            animation: fadeIn 0.3s ease-in-out; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // ตั้งค่า URL ของ Google Apps Script ตรงนี้
        // ==========================================
        const GOOGLE_SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyiasS6xML870dGQhKj2HXQDIX50C-tRz8CN-pu-XGHkAr4T377PQy-Cn9K0HabblGz/exec"; 

        function App() {
            const [formData, setFormData] = useState({
                visitNumber: '1',
                visitDate: new Date().toISOString().split('T')[0],
                birthDate: '', // วันคลอดของทารก
                motherName: '',
                infantName: '',
                bp: '',
                weight: '',
                infantWeight: '',
                infantLength: '',
                infantHeadCircum: '',
                infantTemp: '',
                note: ''
            });

            const [activeTab, setActiveTab] = useState('mother');
            const [isPrinting, setIsPrinting] = useState(false);

            const [motherChecklist, setMotherChecklist] = useState({
                vitalSigns: true,
                breast: true,
                uterus: true,
                lochia: true,
                perineum: true,
                mentalHealth: true,
                contraception: true
            });

            const [infantChecklist, setInfantChecklist] = useState({
                vitalSigns: true,
                feeding: true,
                umbilicalCord: true,
                jaundice: true,
                excretion: true
            });

            const [motherNotes, setMotherNotes] = useState({});
            const [infantNotes, setInfantNotes] = useState({});

            const [status, setStatus] = useState({ type: '', message: '' });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const toggleMotherCheck = (key) => {
                setMotherChecklist(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const toggleInfantCheck = (key) => {
                setInfantChecklist(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const handleMotherNoteChange = (key, value) => {
                setMotherNotes(prev => ({ ...prev, [key]: value }));
            };

            const handleInfantNoteChange = (key, value) => {
                setInfantNotes(prev => ({ ...prev, [key]: value }));
            };

            const formatThaiDate = (dateStr) => {
                if (!dateStr) return '-';
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                const year = parseInt(parts[0]) + 543;
                const monthNames = [
                    "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
                ];
                const month = monthNames[parseInt(parts[1]) - 1];
                const day = parseInt(parts[2]);
                return `${day} ${month} ${year}`;
            };

            const triggerPDFDownload = () => {
                setStatus({ type: 'loading', message: 'กำลังแปลงข้อมูลรายงานเป็นไฟล์ PDF มารดาและทารก...' });
                
                // เลื่อนขึ้นไปบนสุดป้องกันการจับภาพผิดตำแหน่ง
                window.scrollTo(0, 0);

                setTimeout(() => {
                    const element = document.getElementById('report-content');

                    const opt = {
                        margin: 0,
                        filename: `เยี่ยมหลังคลอด_${formData.motherName || 'ไม่ระบุชื่อ'}_ครั้งที่${formData.visitNumber}.pdf`,
                        image: { type: 'jpeg', quality: 1.0 },
                        html2canvas: { 
                            scale: 2, 
                            useCORS: true, 
                            scrollY: 0,
                            scrollX: 0 
                        },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    html2pdf().set(opt).from(element).save().then(() => {
                        setStatus({ type: 'success', message: 'ดาวน์โหลดไฟล์ PDF เรียบร้อยแล้ว!' });
                        setTimeout(() => setStatus({ type: '', message: '' }), 4000);
                    }).catch(err => {
                        setStatus({ type: 'error', message: 'เกิดข้อผิดพลาดในการสร้างไฟล์ PDF กรุณาลองใหม่อีกครั้ง' });
                    });
                }, 500);
            };

            const saveToGoogleSheets = async () => {
                if (!GOOGLE_SHEET_WEB_APP_URL) {
                    setStatus({ type: 'error', message: 'กรุณาใส่ URL ของ Google Apps Script ในโค้ดก่อนครับ' });
                    return;
                }

                setStatus({ type: 'loading', message: 'กำลังบันทึกข้อมูลและส่งสัญญาณไปยัง Google Sheets...' });

                const payload = {
                    ...formData,
                    motherChecklist,
                    infantChecklist,
                    motherNotes,
                    infantNotes
                };

                try {
                    await fetch(GOOGLE_SHEET_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    setStatus({ type: 'success', message: 'ส่งข้อมูลไปบันทึกลงฐานข้อมูล Google Sheets เรียบร้อยแล้วครับ!' });
                    setTimeout(() => setStatus({ type: '', message: '' }), 5000);
                } catch (error) {
                    setStatus({ type: 'error', message: 'เชื่อมต่อฐานข้อมูลไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตหรือ URL' });
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-gray-100 font-sans">
                    
                    {/* ส่วนตรวจเช็คตัวพรีวิวเอกสารก่อนสั่งพิมพ์ */}
                    {isPrinting && (
                        <div className="w-full bg-gray-900 p-4 sticky top-0 z-50 flex flex-col sm:flex-row justify-between items-center text-white gap-3 shadow-lg no-print">
                            <div className="flex items-center gap-2">
                                <span className="bg-pink-600 px-2.5 py-1 rounded-md text-xs font-bold animate-pulse">PREVIEW MODE</span>
                                <span className="text-sm font-medium">รูปแบบนี้คือสิ่งที่จะอยู่ใน PDF ครับ</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={triggerPDFDownload} className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-5 rounded-lg transition text-sm">
                                    💾 ยืนยันดาวน์โหลด PDF
                                </button>
                                <button onClick={() => { setIsPrinting(false); setStatus({ type: '', message: '' }); }} className="bg-gray-700 hover:bg-gray-600 border border-gray-500 text-white font-medium py-2 px-4 rounded-lg transition text-sm">
                                    ↩️ ย้อนกลับไปแก้ไข
                                </button>
                            </div>
                        </div>
                    )}

                    {!isPrinting && status.message && (
                        <div className="w-full max-w-3xl mt-4 px-4 no-print">
                            <div className={`p-4 rounded-xl text-center font-medium shadow-md transition-all ${status.type === 'error' ? 'bg-red-100 text-red-700' : status.type === 'success' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                                {status.message}
                            </div>
                        </div>
                    )}

                    <div className={`transition-all duration-300 w-full ${isPrinting ? 'bg-gray-500 py-8 overflow-x-auto' : 'max-w-3xl my-4 md:my-8 px-4'}`}>
                        
                        {/* ========================================================= */}
                        {/* 🖨️ VIEW สั่งปริ้น (จัดหน้ามารดา 1 / ทารก 2) */}
                        {/* ========================================================= */}
                        {isPrinting ? (
                            
                            <div id="report-content" className="bg-white mx-auto shadow-2xl" style={{ width: '794px' }}>
                                
                                {/* 📄 หน้าที่ 1: รายงานคุณแม่หลังคลอด */}
                                <div className="a4-page text-black relative">
                                    <div>
                                        <div className="text-center pb-4 mb-4 border-b-2 border-black"> 
                                            <h1 className="text-[22px] font-bold leading-tight">แบบบันทึกการเยี่ยมหลังคลอดมารดาและทารก ครั้งที่ {formData.visitNumber}</h1>
                                            <h2 className="text-[17px] mt-1 text-gray-800">โรงพยาบาลส่งเสริมสุขภาพตำบลเกาะแต้ว อำเภอเมือง จังหวัดสงขลา</h2>
                                        </div>

                                        <div className="grid grid-cols-2 gap-y-3 mb-4 text-[15px] pb-4 border-b border-dashed border-gray-300">
                                            <div><strong>ชื่อ-สกุล มารดา:</strong> <span className="ml-1 text-gray-800">{formData.motherName || '...................................................'}</span></div>
                                            <div className="text-right"><strong>วันคลอด:</strong> <span className="ml-1 text-gray-800">{formatThaiDate(formData.birthDate)}</span></div>
                                            <div><strong>ครั้งที่ลงเยี่ยม:</strong> <span className="ml-1 text-gray-800">เยี่ยมครั้งที่ {formData.visitNumber}</span></div>
                                            <div className="text-right"><strong>วันที่ประเมินเยี่ยมหลังคลอด:</strong> <span className="ml-1 text-gray-800">{formatThaiDate(formData.visitDate)}</span></div>
                                            <div><strong>หน่วยบริการ:</strong> <span className="ml-1 text-gray-800">รพ.สต.เกาะแต้ว</span></div>
                                        </div>

                                        <div className="mb-4">
                                            <h3 className="font-bold text-[15px] bg-gray-200 px-3 py-2 mb-3 rounded border border-gray-300">ส่วนที่ 1: การประเมินสัญญาณชีพและสรีระวิทยา (มารดา)</h3>
                                            <div className="flex gap-12 mb-4 ml-2 text-[15px] bg-gray-50 p-3 rounded border">
                                                <div><strong>ความดันโลหิต (Blood Pressure):</strong> <span className="ml-2 font-bold text-gray-950">{formData.bp || '-'}</span> mmHg</div>
                                                <div><strong>น้ำหนักตัวปัจจุบัน:</strong> <span className="ml-2 font-bold text-gray-950">{formData.weight || '-'}</span> กิโลกรัม</div>
                                            </div>
                                        </div>

                                        <div className="mb-4">
                                            <h3 className="font-bold text-[15px] bg-gray-200 px-3 py-2 mb-3 rounded border border-gray-300">ส่วนที่ 2: รายการประเมินภาวะสุขภาพตามเกณฑ์กระทรวงสาธารณสุข</h3>
                                            <div className="grid grid-cols-2 gap-x-6 gap-y-4 ml-2">
                                                <PrintCheckItem label="สัญญาณชีพปกติ (ไม่มีไข้สูง)" checked={motherChecklist.vitalSigns} note={motherNotes.vitalSigns} />
                                                <PrintCheckItem label="เต้านมและหัวนมปกติ (ไม่คัดตึง/อักเสบ)" checked={motherChecklist.breast} note={motherNotes.breast} />
                                                <PrintCheckItem label="มดลูกหดรัดตัวดี (ระดับมดลูกสมดุล)" checked={motherChecklist.uterus} note={motherNotes.uterus} />
                                                <PrintCheckItem label="น้ำคาวปลาปกติ (สีและกลิ่นปกติ)" checked={motherChecklist.lochia} note={motherNotes.lochia} />
                                                <PrintCheckItem label="แผลฝีเย็บ/แผลผ่าตัดปกติ (ไม่อักเสบ)" checked={motherChecklist.perineum} note={motherNotes.perineum} />
                                                <PrintCheckItem label="สภาวะจิตใจปกติ (ไม่พบภาวะซึมเศร้า)" checked={motherChecklist.mentalHealth} note={motherNotes.mentalHealth} />
                                                <PrintCheckItem label="ให้คำแนะนำการปฏิบัติตัวและการคุมกำเนิด" checked={motherChecklist.contraception} note={motherNotes.contraception} />
                                            </div>
                                        </div>

                                        <div className="mb-4 mt-8">
                                            <h3 className="font-bold mb-2 text-[15px] text-gray-900">บันทึกอาการพบเพิ่มเติม / คำแนะนำในการดูแลรักษาเบื้องต้น:</h3>
                                            <div className="min-h-[90px] border border-gray-400 p-3 bg-white text-gray-800 text-[15px] rounded leading-relaxed">
                                                {formData.note || 'ไม่พบปัญหาเพิ่มเติม มารดาสามารถปฏิบัติตัวตามคำแนะนำและเกณฑ์ปกติได้ดี'}
                                            </div>
                                        </div>
                                    </div>

                                    {/* ลายเซ็นต์หน้าแรก */}
                                    <div className="flex justify-end pb-2">
                                        <div className="text-center mr-4">
                                            <div className="flex items-end text-[15px]">
                                                <span className="whitespace-nowrap">ลงชื่อ</span>
                                                <span className="border-b border-dotted border-black w-48 mx-2 inline-block h-4"></span>
                                                <span className="whitespace-nowrap font-bold">ผู้ประเมิน</span>
                                            </div>
                                            <div className="mt-2 text-[13px] text-gray-700 font-medium">( พยาบาลวิชาชีพ รพ.สต.เกาะแต้ว )</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="html2pdf__page-break"></div> 

                                {/* 📄 หน้าที่ 2: รายงานประเมินสุขภาพทารก */}
                                <div className="a4-page text-black relative">
                                    <div>
                                        <div className="text-center pb-4 mb-4 border-b-2 border-black"> 
                                            <h1 className="text-[22px] font-bold leading-tight">แบบบันทึกการเยี่ยมหลังคลอดมารดาและทารก ครั้งที่ {formData.visitNumber}</h1>
                                            <h2 className="text-[17px] mt-1 text-gray-800">โรงพยาบาลส่งเสริมสุขภาพตำบลเกาะแต้ว อำเภอเมือง จังหวัดสงขลา</h2>
                                        </div>

                                        <div className="bg-gray-200 px-3 py-2.5 rounded border border-gray-300 mb-5 flex flex-wrap items-center justify-between">
                                            <span className="font-bold text-[15px] text-gray-900">ส่วนที่ 2: การประเมินทารก เยี่ยมครั้งที่ {formData.visitNumber}</span>
                                            <span className="text-[15px] font-semibold text-gray-950">
                                                ชื่อ-สกุล ทารก: <span className="font-bold text-pink-700 bg-white px-3 py-1 rounded border border-gray-300 ml-2">{formData.infantName || '...................................................'}</span>
                                            </span>
                                        </div>

                                        <div className="grid grid-cols-2 gap-y-3 mb-4 text-[15px] pb-4 border-b border-dashed border-gray-300">
                                            <div><strong>วันคลอดทารก:</strong> <span className="ml-1 text-gray-800">{formatThaiDate(formData.birthDate)}</span></div>
                                            <div className="text-right"><strong>วันที่ประเมินเยี่ยม:</strong> <span className="ml-1 text-gray-800">{formatThaiDate(formData.visitDate)}</span></div>
                                        </div>

                                        <div className="mb-5">
                                            <h3 className="font-bold text-[15px] text-gray-900 mb-3">สัญญาณชีพและการเจริญเติบโตทั่วไปของทารก</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50 p-3.5 rounded border text-[14px]">
                                                <div><strong>น้ำหนักทารก:</strong> <span className="ml-1 font-bold text-gray-900">{formData.infantWeight || '-'}</span> กรัม</div>
                                                <div><strong>ความยาว:</strong> <span className="ml-1 font-bold text-gray-900">{formData.infantLength || '-'}</span> ซม.</div>
                                                <div><strong>รอบศีรษะ:</strong> <span className="ml-1 font-bold text-gray-900">{formData.infantHeadCircum || '-'}</span> ซม.</div>
                                                <div><strong>อุณหภูมิ:</strong> <span className="ml-1 font-bold text-gray-900">{formData.infantTemp || '-'}</span> °C</div>
                                            </div>
                                        </div>

                                        <div className="mb-5">
                                            <h3 className="font-bold text-[15px] bg-gray-200 px-3 py-2 mb-3 rounded border border-gray-300">รายการประเมินภาวะสุขภาพเด็กทารกตามเกณฑ์กระทรวง</h3>
                                            <div className="grid grid-cols-2 gap-x-6 gap-y-4 ml-2">
                                                <PrintCheckItem label="สัญญาณชีพและอุณหภูมิร่างกายปกติ" checked={infantChecklist.vitalSigns} note={infantNotes.vitalSigns} />
                                                <PrintCheckItem label="การดูดนมและการกลืนปกติ (กินนมแม่ได้ดี)" checked={infantChecklist.feeding} note={infantNotes.feeding} />
                                                <PrintCheckItem label="สะดือแห้งดี / ไม่มีอาการกลิ่นหรือติดเชื้อ" checked={infantChecklist.umbilicalCord} note={infantNotes.umbilicalCord} />
                                                <PrintCheckItem label="ผิวหนังทารกปกติ (ไม่มีภาวะตัวเหลือง)" checked={infantChecklist.jaundice} note={infantNotes.jaundice} />
                                                <PrintCheckItem label="การขับถ่ายปัสสาวะและอุจจาระปกติ" checked={infantChecklist.excretion} note={infantNotes.excretion} />
                                            </div>
                                        </div>

                                        <div className="mb-4 mt-8">
                                            <h3 className="font-bold mb-2 text-[15px] text-gray-900">บันทึกเพิ่มเติมทารก / ปัญหาอื่นที่พบ:</h3>
                                            <div className="min-h-[90px] border border-gray-400 p-3 bg-white text-gray-800 text-[15px] rounded leading-relaxed">
                                                {formData.note ? `บันทึกเกี่ยวกับทารก: ${formData.note}` : 'ทารกเจริญเติบโตตามเกณฑ์ดี สุขภาพร่างกายสมบูรณ์และแข็งแรงดี'}
                                            </div>
                                        </div>
                                    </div>

                                    {/* ลายเซ็นต์หน้าสอง */}
                                    <div className="flex justify-end pb-2">
                                        <div className="text-center mr-4">
                                            <div className="flex items-end text-[15px]">
                                                <span className="whitespace-nowrap">ลงชื่อ</span>
                                                <span className="border-b border-dotted border-black w-48 mx-2 inline-block h-4"></span>
                                                <span className="whitespace-nowrap font-bold">ผู้ประเมิน</span>
                                            </div>
                                            <div className="mt-2 text-[13px] text-gray-700 font-medium">( พยาบาลวิชาชีพ รพ.สต.เกาะแต้ว )</div>
                                        </div>
                                    </div>
                                </div>

                            </div>

                        ) : (
                            
                            // =========================================================
                            // 💻 VIEW หน้าเว็บกรอกข้อมูล (มี 2 แท็บ)
                            // =========================================================
                            <div className="bg-white shadow-xl rounded-2xl overflow-hidden w-full">
                                <div className="bg-gradient-to-r from-pink-500 to-pink-600 text-white p-6 text-center shadow-md">
                                    <h1 className="text-2xl font-bold">แบบบันทึกการเยี่ยมหลังคลอดมารดาและทารก</h1>
                                    <p className="text-pink-100 mt-1">โรงพยาบาลส่งเสริมสุขภาพตำบลเกาะแต้ว อ.เมือง จ.สงขลา</p>
                                </div>

                                <div className="p-6 md:p-8">
                                    {/* ข้อมูลทั่วไปประกอบการประเมิน */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">👩 ชื่อ-สกุล มารดา</label>
                                            <input type="text" name="motherName" value={formData.motherName} onChange={handleInputChange} 
                                                className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm" 
                                                placeholder="เช่น นางสุดา ใจดี" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">👶 ชื่อ-สกุล ทารก</label>
                                            <input type="text" name="infantName" value={formData.infantName} onChange={handleInputChange} 
                                                className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm" 
                                                placeholder="เช่น เด็กชายสมศักดิ์ ใจดี" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">👶 วันเกิด / วันคลอด</label>
                                            <input type="date" name="birthDate" value={formData.birthDate} onChange={handleInputChange} 
                                                className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">📅 วันที่ประเมินลงเยี่ยม</label>
                                            <input type="date" name="visitDate" value={formData.visitDate} onChange={handleInputChange} 
                                                className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm" />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">🏆 เยี่ยมครั้งที่</label>
                                            <select name="visitNumber" value={formData.visitNumber} onChange={handleInputChange} 
                                                className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm">
                                                <option value="1">ครั้งที่ 1 (ภายใน 7 วันหลังคลอด)</option>
                                                <option value="2">ครั้งที่ 2 (วันที่ 8-14 หลังคลอด)</option>
                                                <option value="3">ครั้งที่ 3 (วันที่ 15-42 หลังคลอด)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex border-b border-gray-200 mb-6 bg-gray-50 rounded-lg p-1">
                                        <button 
                                            onClick={() => setActiveTab('mother')}
                                            className={`flex-1 py-3 text-center font-bold rounded-lg transition-all ${activeTab === 'mother' ? 'text-pink-700 bg-white shadow' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>
                                            👩 ส่วนตรวจมารดา
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('infant')}
                                            className={`flex-1 py-3 text-center font-bold rounded-lg transition-all ${activeTab === 'infant' ? 'text-blue-700 bg-white shadow' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>
                                            👶 ส่วนตรวจทารก
                                        </button>
                                    </div>

                                    {/* แท็บตรวจร่างกาย มารดา */}
                                    <div className={`${activeTab === 'mother' ? 'block' : 'hidden'} mb-8 animate-fade-in`}>
                                        <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                            <span className="bg-pink-100 text-pink-600 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm">👩</span>
                                            ประเมินและวัดสัญญาณชีพมารดา
                                        </h2>
                                        <div className="grid grid-cols-2 gap-4 mb-6 bg-pink-50/50 p-4 rounded-xl border border-pink-100 shadow-inner">
                                            <div>
                                                <label className="block text-xs font-bold text-pink-900 mb-1">ความดันโลหิต (mmHg)</label>
                                                <input type="text" name="bp" value={formData.bp} onChange={handleInputChange} 
                                                    className="w-full border border-pink-200 rounded-lg p-2 focus:ring-2 focus:ring-pink-500 bg-white shadow-sm" placeholder="เช่น 115/75" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-pink-900 mb-1">น้ำหนักมารดา (กก.)</label>
                                                <input type="number" step="0.1" name="weight" value={formData.weight} onChange={handleInputChange} 
                                                    className="w-full border border-pink-200 rounded-lg p-2 focus:ring-2 focus:ring-pink-500 bg-white shadow-sm" placeholder="เช่น 58.4" />
                                            </div>
                                        </div>

                                        <p className="text-xs text-gray-500 mb-3">* ปลดติ๊กถูกออกเพื่อระบุความผิดปกติและช่องพิมพ์จะเด้งขึ้นมาให้จดโน้ตทันที</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <CheckItem label="สัญญาณชีพปกติ (ไม่มีไข้หนาวสั่น)" checked={motherChecklist.vitalSigns} onChange={() => toggleMotherCheck('vitalSigns')} noteValue={motherNotes.vitalSigns} onNoteChange={(e) => handleMotherNoteChange('vitalSigns', e.target.value)} />
                                            <CheckItem label="เต้านมและหัวนมปกติ (ไม่บวมแดง/ไม่อักเสบ)" checked={motherChecklist.breast} onChange={() => toggleMotherCheck('breast')} noteValue={motherNotes.breast} onNoteChange={(e) => handleMotherNoteChange('breast', e.target.value)} />
                                            <CheckItem label="มดลูกหดรัดตัวดี (ระดับยอดมดลูกปกติ)" checked={motherChecklist.uterus} onChange={() => toggleMotherCheck('uterus')} noteValue={motherNotes.uterus} onNoteChange={(e) => handleMotherNoteChange('uterus', e.target.value)} />
                                            <CheckItem label="น้ำคาวปลาปกติ (สีไม่แดงสดเกินไป/ไม่มีกลิ่นเหม็น)" checked={motherChecklist.lochia} onChange={() => toggleMotherCheck('lochia')} noteValue={motherNotes.lochia} onNoteChange={(e) => handleMotherNoteChange('lochia', e.target.value)} />
                                            <CheckItem label="แผลฝีเย็บ/แผลผ่าตัดปกติ (ไม่บวมแดงอักเสบ)" checked={motherChecklist.perineum} onChange={() => toggleMotherCheck('perineum')} noteValue={motherNotes.perineum} onNoteChange={(e) => handleMotherNoteChange('perineum', e.target.value)} />
                                            <CheckItem label="สภาวะจิตใจปกติ (ประเมินภาวะซึมเศร้าหลังคลอดแล้ว)" checked={motherChecklist.mentalHealth} onChange={() => toggleMotherCheck('mentalHealth')} noteValue={motherNotes.mentalHealth} onNoteChange={(e) => handleMotherNoteChange('mentalHealth', e.target.value)} />
                                            <CheckItem label="ให้คำแนะนำเรื่องการคุมกำเนิดและการดูแลสุขภาพแล้ว" checked={motherChecklist.contraception} onChange={() => toggleMotherCheck('contraception')} noteValue={motherNotes.contraception} onNoteChange={(e) => handleMotherNoteChange('contraception', e.target.value)} />
                                        </div>
                                    </div>

                                    {/* แท็บตรวจร่างกาย ทารก */}
                                    <div className={`${activeTab === 'infant' ? 'block' : 'hidden'} mb-8 animate-fade-in`}>
                                        <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                            <span className="bg-blue-100 text-blue-600 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm">👶</span>
                                            ประเมินภาวะร่างกายและเติบโตทารก
                                        </h2>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100 shadow-inner">
                                            <div>
                                                <label className="block text-xs font-bold text-blue-900 mb-1">น้ำหนักตัว (กรัม)</label>
                                                <input type="number" name="infantWeight" value={formData.infantWeight} onChange={handleInputChange} 
                                                    className="w-full border border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น 3150" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-blue-900 mb-1">ความยาว (ซม.)</label>
                                                <input type="number" step="0.1" name="infantLength" value={formData.infantLength} onChange={handleInputChange} 
                                                    className="w-full border border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น 51.5" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-blue-900 mb-1">รอบศีรษะ (ซม.)</label>
                                                <input type="number" step="0.1" name="infantHeadCircum" value={formData.infantHeadCircum} onChange={handleInputChange} 
                                                    className="w-full border border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น 34" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-blue-900 mb-1">อุณหภูมิ (°C)</label>
                                                <input type="number" step="0.1" name="infantTemp" value={formData.infantTemp} onChange={handleInputChange} 
                                                    className="w-full border border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น 36.8" />
                                            </div>
                                        </div>

                                        <p className="text-xs text-gray-500 mb-3">* ปลดติ๊กถูกออกเพื่อระบุความผิดปกติและช่องพิมพ์จะเด้งขึ้นมาให้จดโน้ตทันที</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <CheckItem label="สัญญาณชีพและอุณหภูมิร่างกายปกติ" checked={infantChecklist.vitalSigns} onChange={() => toggleInfantCheck('vitalSigns')} noteValue={infantNotes.vitalSigns} onNoteChange={(e) => handleInfantNoteChange('vitalSigns', e.target.value)} />
                                            <CheckItem label="การดูดนมและการกลืนปกติ (กินนมแม่ได้ดีสมบูรณ์)" checked={infantChecklist.feeding} onChange={() => toggleInfantCheck('feeding')} noteValue={infantNotes.feeding} onNoteChange={(e) => handleInfantNoteChange('feeding', e.target.value)} />
                                            <CheckItem label="สะดือแห้งดี / ไม่มีอาการกลิ่นเหม็นอักเสบ" checked={infantChecklist.umbilicalCord} onChange={() => toggleInfantCheck('umbilicalCord')} noteValue={infantNotes.umbilicalCord} onNoteChange={(e) => handleInfantNoteChange('umbilicalCord', e.target.value)} />
                                            <CheckItem label="ผิวหนังปกติ (ไม่มีภาวะตัวเหลืองตาเหลือง)" checked={infantChecklist.jaundice} onChange={() => toggleInfantCheck('jaundice')} noteValue={infantNotes.jaundice} onNoteChange={(e) => handleInfantNoteChange('jaundice', e.target.value)} />
                                            <CheckItem label="การขับถ่ายปัสสาวะและอุจจาระปกติ" checked={infantChecklist.excretion} onChange={() => toggleInfantCheck('excretion')} noteValue={infantNotes.excretion} onNoteChange={(e) => handleInfantNoteChange('excretion', e.target.value)} />
                                        </div>
                                    </div>

                                    <div className="mb-8">
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">บันทึกเพิ่มเติมของพยาบาล / วางแผนการส่งต่อ</label>
                                        <textarea name="note" value={formData.note} onChange={handleInputChange} rows="3"
                                            className="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all shadow-sm"
                                            placeholder="ระบุข้อแนะนำเพิ่มเติมเพื่อการติดตามผล..."></textarea>
                                    </div>

                                    <div id="action-buttons" className="flex flex-col sm:flex-row gap-4 justify-center mt-8 no-print">
                                        <button onClick={saveToGoogleSheets} 
                                            className="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition duration-200 flex items-center justify-center shadow-lg shadow-green-100">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                            </svg>
                                            บันทึกลง Google Sheets
                                        </button>
                                        
                                        <button onClick={() => setIsPrinting(true)} 
                                            className="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-xl transition duration-200 flex items-center justify-center shadow-lg shadow-pink-100">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                                                <path fillRule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v3.586l-1.293-1.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V8z" clipRule="evenodd" />
                                            </svg>
                                            พิมพ์ตรวจพรีวิวและดาวน์โหลด (PDF)
                                        </button>
                                    </div>
                                    
                                    <div className="mt-8 text-center text-gray-400 text-xs">
                                        พยาบาลผู้บันทึก: โรงพยาบาลส่งเสริมสุขภาพตำบลเกาะแต้ว
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function CheckItem({ label, checked, onChange, noteValue, onNoteChange }) {
            return (
                <div className={`p-3.5 border rounded-xl transition-all duration-300 ${checked ? 'bg-pink-50 border-pink-200' : 'bg-red-50 border-red-200 shadow-sm'}`}>
                    <label className="flex items-start cursor-pointer select-none">
                        <div className="flex items-center h-5">
                            <input type="checkbox" checked={checked} onChange={onChange} 
                                className={`w-5 h-5 rounded focus:ring-2 transition ${checked ? 'text-pink-600 border-pink-300 focus:ring-pink-500' : 'text-red-600 border-red-400 focus:ring-red-500'}`} />
                        </div>
                        <div className="ml-3 text-sm flex-1">
                            <span className={`font-semibold ${checked ? 'text-pink-900' : 'text-red-700'}`}>{label}</span>
                        </div>
                    </label>
                    
                    {!checked && (
                        <div className="mt-2.5 ml-8 animate-fade-in">
                            <input type="text" value={noteValue || ''} onChange={onNoteChange} 
                                className="w-full border border-red-300 rounded-lg p-2 text-xs focus:ring-red-500 focus:border-red-500 bg-white placeholder-red-300" 
                                placeholder="ระบุภาวะผิดปกติ / การรักษา / การช่วยเหลือเบื้องต้น..." />
                        </div>
                    )}
                </div>
            );
        }

        function PrintCheckItem({ label, checked, note }) {
            return (
                <div className="flex items-start text-[14px] leading-relaxed">
                    {checked ? (
                        <span className="text-green-600 font-bold mr-2 text-[18px] leading-none">☑</span>
                    ) : (
                        <span className="text-red-600 font-bold mr-2 text-[18px] leading-none">☒</span>
                    )}
                    <div className={checked ? 'text-gray-800' : 'text-red-600 font-semibold'}>
                        <span>{label}</span>
                        {!checked && (
                            <span className="block text-[13px] text-red-500 font-normal mt-1 border-b border-red-100 pb-0.5 leading-snug">
                                ระบุเพิ่มเติม: {note || 'ไม่ได้ระบุข้อความ'}
                            </span>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
